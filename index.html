<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Md Fahad Bin Firdous — Web3 Growth Strategist</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --bg2: #0f0f0f;
    --surface: #141414;
    --border: #1e1e1e;
    --border2: #2a2a2a;
    --text: #e8e4dc;
    --text2: #8a8070;
    --text3: #5a5248;
    --accent: #c8b89a;
    --accent2: #a89070;
    --green: #4a7c59;
    --green-light: #6aad7a;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    line-height: 1.6;
    overflow-x: hidden;
    cursor: none;
  }
  /* Custom cursor */
  .cursor {
    position: fixed;
    width: 8px;
    height: 8px;
    background: var(--accent);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%, -50%);
    transition: transform 0.1s ease, width 0.2s ease, height 0.2s ease, opacity 0.2s ease;
  }
  .cursor-ring {
    position: fixed;
    width: 32px;
    height: 32px;
    border: 1px solid rgba(200,184,154,0.35);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9998;
    transform: translate(-50%, -50%);
    transition: transform 0.12s ease, width 0.25s ease, height 0.25s ease;
  }
  body:hover .cursor { opacity: 1; }

  /* Typography */
  .font-serif { font-family: 'DM Serif Display', serif; }
  .font-mono { font-family: 'DM Mono', monospace; }
  .font-sans { font-family: 'Syne', sans-serif; }

  /* Nav */
  nav {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 100;
    padding: 1.5rem 4rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(10,10,10,0.85);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(30,30,30,0.5);
  }
  .nav-logo {
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    color: var(--text2);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .nav-links { display: flex; gap: 2.5rem; }
  .nav-links a {
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text3);
    text-decoration: none;
    transition: color 0.2s;
  }
  .nav-links a:hover { color: var(--text); }

  /* Horizontal rule decoration */
  .rule {
    width: 100%;
    height: 1px;
    background: var(--border);
    margin: 0;
  }
  .rule-accent {
    height: 1px;
    background: linear-gradient(to right, var(--accent2), transparent);
  }

  /* Section label */
  .section-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text3);
  }

  /* ========================
     HERO
     ======================== */
  #hero {
    min-height: 100vh;
    padding-top: 5rem;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .hero-image-band {
    width: 100%;
    display: flex;
    justify-content: center;
    align-items: flex-end;
    padding-top: 3rem;
    position: relative;
    flex: 0 0 auto;
  }
  .hero-img-frame {
    position: relative;
    width: 260px;
    height: 310px;
    flex-shrink: 0;
  }
  .hero-img-frame img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
    filter: grayscale(12%) contrast(1.06);
    display: block;
  }
  .hero-img-frame::before {
    content: '';
    position: absolute;
    inset: -1px;
    border: 1px solid var(--border2);
    pointer-events: none;
    z-index: 2;
  }
  .hero-img-shadow {
    position: absolute;
    bottom: -2rem;
    left: 50%;
    transform: translateX(-50%);
    width: 200px;
    height: 3rem;
    background: radial-gradient(ellipse, rgba(200,184,154,0.08) 0%, transparent 70%);
    pointer-events: none;
  }
  /* Flanking text beside image */
  .hero-image-band-inner {
    display: flex;
    align-items: flex-end;
    gap: 4rem;
    max-width: 1100px;
    width: 100%;
    padding: 0 4rem;
  }
  .hero-side-left {
    flex: 1;
    padding-bottom: 1.5rem;
    text-align: right;
  }
  .hero-side-right {
    flex: 1;
    padding-bottom: 1.5rem;
  }
  .hero-side-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 0.5rem;
  }
  .hero-side-text {
    font-size: 0.85rem;
    color: var(--text2);
    line-height: 1.65;
    max-width: 22ch;
    margin-left: auto;
  }
  .hero-side-text-right {
    font-size: 0.85rem;
    color: var(--text2);
    line-height: 1.65;
    max-width: 22ch;
  }

  /* Bottom content block */
  .hero-bottom {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    padding: 3.5rem 4rem 5rem;
    position: relative;
  }
  .hero-eyebrow {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 1.5rem;
    justify-content: center;
  }
  .hero-eyebrow-line {
    width: 2rem;
    height: 1px;
    background: var(--accent2);
  }
  .hero-name {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(3.2rem, 6vw, 6.5rem);
    line-height: 0.95;
    letter-spacing: -0.03em;
    color: var(--text);
    margin-bottom: 1.5rem;
  }
  .hero-name em {
    font-style: italic;
    color: var(--accent);
  }
  .hero-headline {
    font-family: 'Syne', sans-serif;
    font-size: clamp(0.9rem, 1.1vw, 1.0rem);
    font-weight: 400;
    color: var(--text2);
    max-width: 52ch;
    margin-bottom: 2.5rem;
    line-height: 1.75;
  }
  .hero-headline strong {
    color: var(--text);
    font-weight: 600;
  }
  .hero-edge {
    padding: 1.5rem 0;
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    margin-bottom: 2.5rem;
    display: flex;
    gap: 4rem;
    justify-content: center;
    width: 100%;
    max-width: 560px;
  }
  .hero-stat-num {
    font-family: 'DM Serif Display', serif;
    font-size: 2.2rem;
    color: var(--text);
    line-height: 1;
  }
  .hero-stat-label {
    font-size: 0.68rem;
    color: var(--text3);
    letter-spacing: 0.05em;
    margin-top: 0.3rem;
    text-transform: uppercase;
    font-family: 'DM Mono', monospace;
  }
  .hero-cta {
    display: flex;
    align-items: center;
    gap: 1.5rem;
    justify-content: center;
  }
  .btn-primary {
    display: inline-flex;
    align-items: center;
    gap: 0.6rem;
    background: var(--text);
    color: var(--bg);
    padding: 0.9rem 2rem;
    font-family: 'Syne', sans-serif;
    font-size: 0.78rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    text-decoration: none;
    transition: background 0.2s, color 0.2s;
  }
  .btn-primary:hover {
    background: var(--accent);
  }
  .btn-ghost {
    display: inline-flex;
    align-items: center;
    gap: 0.6rem;
    color: var(--text2);
    font-size: 0.78rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    text-decoration: none;
    transition: color 0.2s;
    font-family: 'DM Mono', monospace;
  }
  .btn-ghost:hover { color: var(--text); }
  .btn-ghost::after {
    content: '→';
    transition: transform 0.2s;
  }
  .btn-ghost:hover::after { transform: translateX(4px); }

  /* decorative corner label */
  .hero-corner-label {
    position: absolute;
    bottom: 1.5rem;
    right: 4rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    color: var(--text3);
    text-transform: uppercase;
  }

  /* ========================
     WHAT I DO
     ======================== */
  #what {
    padding: 8rem 4rem;
    border-top: 1px solid var(--border);
    display: grid;
    grid-template-columns: 1fr 2fr;
    gap: 4rem;
  }
  .what-left {
    padding-top: 0.3rem;
  }
  .what-title {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(2.2rem, 3.5vw, 3.8rem);
    line-height: 1.1;
    margin-top: 1.5rem;
    color: var(--text);
  }
  .what-title em { font-style: italic; color: var(--accent); }
  .what-right {}
  .what-intro {
    font-size: 1.1rem;
    color: var(--text2);
    max-width: 55ch;
    line-height: 1.75;
    margin-bottom: 4rem;
  }
  .what-intro strong { color: var(--text); font-weight: 600; }

  .services-list { display: flex; flex-direction: column; gap: 0; }
  .service-item {
    display: grid;
    grid-template-columns: 2.5rem 1fr auto;
    align-items: start;
    padding: 2rem 0;
    border-top: 1px solid var(--border);
    gap: 1.5rem;
    transition: background 0.2s;
    cursor: default;
  }
  .service-item:last-child { border-bottom: 1px solid var(--border); }
  .service-num {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: var(--text3);
    padding-top: 0.2rem;
  }
  .service-body {}
  .service-title {
    font-family: 'Syne', sans-serif;
    font-size: 1.05rem;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 0.5rem;
  }
  .service-desc {
    font-size: 0.875rem;
    color: var(--text2);
    line-height: 1.65;
    max-width: 50ch;
  }
  .service-tag {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: var(--text3);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    white-space: nowrap;
    padding-top: 0.25rem;
  }

  /* ========================
     HOW I THINK
     ======================== */
  #think {
    padding: 8rem 4rem;
    border-top: 1px solid var(--border);
    background: var(--bg2);
  }
  .think-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 5rem;
    gap: 2rem;
  }
  .think-title {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(2.2rem, 3.5vw, 3.8rem);
    line-height: 1.1;
    margin-top: 1.5rem;
    max-width: 12ch;
  }
  .think-title em { font-style: italic; color: var(--accent); }
  .think-intro-text {
    max-width: 42ch;
    color: var(--text2);
    font-size: 0.95rem;
    line-height: 1.75;
    padding-top: 1.8rem;
  }
  .think-intro-text strong { color: var(--text); }

  .insights-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 0;
    border: 1px solid var(--border);
  }
  .insight-block {
    padding: 2.5rem;
    border-right: 1px solid var(--border);
    position: relative;
    overflow: hidden;
  }
  .insight-block:last-child { border-right: none; }
  .insight-block::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(to right, var(--accent2), transparent);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .insight-block:hover::before { opacity: 1; }
  .insight-icon {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    color: var(--text3);
    text-transform: uppercase;
    margin-bottom: 1.5rem;
  }
  .insight-quote {
    font-family: 'DM Serif Display', serif;
    font-size: 1.35rem;
    line-height: 1.35;
    color: var(--text);
    margin-bottom: 1rem;
  }
  .insight-quote em { font-style: italic; color: var(--accent); }
  .insight-body {
    font-size: 0.845rem;
    color: var(--text2);
    line-height: 1.7;
  }

  /* ========================
     PROOF
     ======================== */
  #proof {
    padding: 8rem 4rem;
    border-top: 1px solid var(--border);
  }
  .proof-top {
    display: grid;
    grid-template-columns: 1fr 1.8fr;
    gap: 6rem;
    align-items: start;
    margin-bottom: 5rem;
  }
  .proof-left-head { }
  .proof-big-num {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(5rem, 10vw, 9rem);
    line-height: 0.85;
    color: transparent;
    -webkit-text-stroke: 1px var(--border2);
    margin-bottom: 1.5rem;
  }
  .proof-title {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(2rem, 2.8vw, 3rem);
    line-height: 1.15;
    margin-top: 1.5rem;
    margin-bottom: 1.5rem;
  }
  .proof-title em { font-style: italic; color: var(--accent); }
  .proof-desc {
    color: var(--text2);
    font-size: 0.875rem;
    line-height: 1.75;
  }
  .proof-right-intro {
    padding-top: 1rem;
    font-size: 1.0rem;
    color: var(--text2);
    line-height: 1.8;
    max-width: 58ch;
  }
  .proof-right-intro strong { color: var(--text); }

  /* Credential cards — horizontal strip */
  .proof-credentials {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0;
    border: 1px solid var(--border);
  }
  .cred-block {
    padding: 2.5rem 2.5rem 2rem;
    border-right: 1px solid var(--border);
    position: relative;
  }
  .cred-block:last-child { border-right: none; }
  .cred-block::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(to right, var(--accent2), transparent);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .cred-block:hover::after { opacity: 1; }
  .cred-num {
    font-family: 'DM Serif Display', serif;
    font-size: 3rem;
    color: var(--text);
    line-height: 1;
    margin-bottom: 0.4rem;
  }
  .cred-num span {
    font-size: 1.4rem;
    color: var(--accent);
  }
  .cred-title {
    font-size: 0.8rem;
    font-weight: 700;
    color: var(--text);
    letter-spacing: 0.05em;
    text-transform: uppercase;
    font-family: 'Syne', sans-serif;
    margin-bottom: 1rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid var(--border);
  }
  .cred-body {
    font-size: 0.845rem;
    color: var(--text2);
    line-height: 1.7;
  }

  /* Bottom observation block */
  .observation-block {
    margin-top: 3rem;
    padding: 2rem 2.5rem;
    border: 1px solid var(--border);
    background: var(--surface);
    position: relative;
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 2rem;
    align-items: center;
  }
  .obs-quote-mark {
    font-family: 'DM Serif Display', serif;
    font-size: 4rem;
    line-height: 1;
    color: var(--border2);
    align-self: flex-start;
    margin-top: -0.5rem;
  }
  .observation-text {
    font-family: 'DM Serif Display', serif;
    font-size: 1.2rem;
    line-height: 1.55;
    color: var(--text);
    margin-bottom: 0.75rem;
  }
  .observation-attr {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: var(--text3);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  /* ========================
     HOW I WORK
     ======================== */
  #process {
    padding: 8rem 4rem;
    border-top: 1px solid var(--border);
    background: var(--bg2);
  }
  .process-top {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 4rem;
    margin-bottom: 5rem;
    align-items: end;
  }
  .process-title {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(2.2rem, 3.5vw, 3.8rem);
    line-height: 1.1;
    margin-top: 1.5rem;
  }
  .process-title em { font-style: italic; color: var(--accent); }
  .process-subtitle {
    color: var(--text2);
    font-size: 0.9rem;
    line-height: 1.75;
    max-width: 45ch;
    padding-bottom: 0.5rem;
  }

  .steps-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0;
    border: 1px solid var(--border);
  }
  .step {
    padding: 2.5rem 2rem;
    border-right: 1px solid var(--border);
    position: relative;
  }
  .step:last-child { border-right: none; }
  .step-num {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    color: var(--text3);
    margin-bottom: 2rem;
    text-transform: uppercase;
  }
  .step-title {
    font-family: 'Syne', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 0.75rem;
    line-height: 1.3;
  }
  .step-desc {
    font-size: 0.835rem;
    color: var(--text2);
    line-height: 1.65;
  }
  .step-arrow {
    position: absolute;
    top: 2.5rem;
    right: -0.7rem;
    width: 1.4rem;
    height: 1px;
    background: var(--border2);
    z-index: 1;
  }
  .step-arrow::after {
    content: '';
    position: absolute;
    right: 0;
    top: -3px;
    width: 6px;
    height: 6px;
    border-top: 1px solid var(--border2);
    border-right: 1px solid var(--border2);
    transform: rotate(45deg);
  }
  .step:last-child .step-arrow { display: none; }

  /* ========================
     CONTACT
     ======================== */
  #contact {
    padding: 8rem 4rem 6rem;
    border-top: 1px solid var(--border);
    display: grid;
    grid-template-columns: 1.2fr 1fr;
    gap: 6rem;
    align-items: start;
  }
  .contact-left {}
  .contact-title {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(2.5rem, 4.5vw, 5rem);
    line-height: 1.0;
    letter-spacing: -0.02em;
    margin-top: 1.5rem;
    margin-bottom: 1.5rem;
  }
  .contact-title em { font-style: italic; color: var(--accent); }
  .contact-desc {
    color: var(--text2);
    font-size: 0.9rem;
    line-height: 1.75;
    max-width: 38ch;
    margin-bottom: 3rem;
  }
  .contact-desc strong { color: var(--text); }

  .contact-channels {
    display: flex;
    flex-direction: column;
    gap: 0;
  }
  .contact-channel {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1.25rem 0;
    border-bottom: 1px solid var(--border);
    text-decoration: none;
    color: var(--text2);
    transition: color 0.2s;
    group: true;
  }
  .contact-channel:first-child { border-top: 1px solid var(--border); }
  .contact-channel:hover { color: var(--text); }
  .contact-channel:hover .cc-arrow { transform: translateX(4px); }
  .cc-left { display: flex; flex-direction: column; gap: 0.2rem; }
  .cc-platform {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text3);
  }
  .cc-handle {
    font-size: 0.95rem;
    font-weight: 500;
    color: inherit;
  }
  .cc-arrow {
    font-size: 1rem;
    transition: transform 0.2s;
    color: var(--text3);
  }

  /* Right side decorative */
  .contact-right {
    padding-top: 3.5rem;
    display: flex;
    flex-direction: column;
    gap: 2rem;
  }
  .contact-note {
    padding: 2rem;
    border: 1px solid var(--border);
    background: var(--surface);
  }
  .contact-note-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    color: var(--text3);
    text-transform: uppercase;
    margin-bottom: 0.75rem;
  }
  .contact-note-text {
    font-size: 0.9rem;
    color: var(--text2);
    line-height: 1.7;
  }
  .contact-note-text strong { color: var(--text); }
  .availability-dot {
    display: inline-block;
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--green-light);
    margin-right: 0.5rem;
    animation: pulse-dot 2s ease-in-out infinite;
  }
  @keyframes pulse-dot {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.6; transform: scale(0.85); }
  }

  /* Footer */
  footer {
    border-top: 1px solid var(--border);
    padding: 2rem 4rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
